width:100%;

z-index:3;

/* PRODUCT CARD GLOW BORDER */

.card{
position:relative;
overflow:hidden;
z-index:1;
}

/* rotating border */
.card::before{
content:"";
position:absolute;

top:-150%;
left:-150%;
width:400%;
height:400%;



background:
conic-gradient(
red,
orange,
yellow,
lime,
cyan,
blue,
violet,
red
);



animation:rotateBorder 4s linear infinite;
z-index:0;
}

/* inner layer */
.card::after{
content:"";
position:absolute;

top:5px;
left:5px;
right:5px;
bottom:5px;

background:white;
border-radius:10px;

z-index:1;
}

/* keep content above border */
.card>*{
position:relative;
z-index:2;
}

@keyframes rotateBorder{
from{
transform:rotate(0deg);
}

to{
transform:rotate(360deg);
}
}

/* FLOWING BLUE + RED GLOW BUTTON */

.card button{

position:relative;
overflow:hidden;

margin-top:10px;

padding:12px 22px;

border:none;
border-radius:12px;

cursor:pointer;

font-size:15px;
font-weight:bold;

color:white;

/* Blue → Red Flow */
background:
linear-gradient(
90deg,
blue,
green


);

background-size:350% 100%;

animation:flowGlow 4s linear infinite;

transition:
transform .3s ease,
box-shadow .3s ease;

box-shadow:
0 0 15px rgba(0,77,255,.8),
0 0 35px rgba(41,121,255,.8),
0 0 65px rgba(255,23,68,.8);

}


/* flowing animation */

@keyframes flowGlow{

0%{
background-position:0% 50%;
}

100%{
background-position:100% 50%;
}

}


/* Hover */

.card button:hover{

transform:
translateY(-5px)
scale(1.05);

box-shadow:
0 0 25px #004dff,
0 0 55px #00c2ff,
0 0 95px #ff1744;

filter:
brightness(1.15);

}


/* Click */

.card button:active{

transform:
translateY(2px)
scale(.95);

box-shadow:
0 0 14px white;

}

style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.7);justify-content:center;align-items:center;z-index:999">

  style="background:white;width:90%;max-width:500px;border-radius:10px;padding:20px;position:relative">

</div><script>
let products=[
{name:"DS Ghee 1ltr",price:400,img:"https://mir-s3-cdn-cf.behance.net/projects/404/26028a239385209.Y3JvcCwxOTQyLDE1MTksMjgsMA.png",desc:"Dairy Saras Ghee."},
{name:"DS Ghee JAR 1ltr",price:400,img:"https://kdpghee.in/wp-content/uploads/2019/01/FINAL-DAIRY-SARAS-DESI-GHEE-3-JAR-1-LTR-1-300x300.webp",desc:"Dairy Saras Ghee."},
{name:"DS Ghee Tin 5kg 400 RS/kg",price:2000,img:"https://kdpghee.in/wp-content/uploads/2019/01/FINAL-DAIRY-SARAS-DESI-GHEE-TUB-1-1.webp",desc:"Dairy Saras Ghee."},
{name:"DS Ghee Tin 15kg 400 RS/kg",price:6000,img:"https://kdpghee.in/wp-content/uploads/2019/01/FINAL-DAIRY-SARAS-DESI-GHEE-TUB-1-1.webp",desc:"Dairy Saras Ghee."},
]
let cart={}
function loadProducts(){
let grid=document.getElementById("productGrid")
products.forEach((p,i)=>{
grid.innerHTML+=`
<div class="card">
<img src="${p.img}" onclick="openPopup(${i})" style="cursor:pointer">
<h3>${p.name}</h3>
<p>₹${p.price}</p>
<button onclick="addCart(${i})">Add to Cart</button>
</div>`
})
}
loadProducts()

function addCart(i){
let product = products[i]

if(cart[i]){
  cart[i].qty += 1
}else{
  cart[i] = {...product, qty:1}
}

updateCart()
}

function updateCart(){

let items=""
let checkoutItems=""
let total=0
let count=0

for(let i in cart){
let p = cart[i]

count += p.qty
total += p.price * p.qty

items += `<p>${p.name} - ${p.qty} x ₹${p.price}</p>`

checkoutItems += `
<div style="display:flex;justify-content:space-between;align-items:center;margin:10px 0;background:#f5fff6;padding:8px;border-radius:6px">
  <span>${p.name}</span>

  <div>
    <button onclick="changeQty(${i},-1)">−</button>
    <b style="margin:0 10px">${p.qty}</b>
    <button onclick="changeQty(${i},1)">+</button>
  </div>

  <span>₹${p.price * p.qty}</span>
</div>`
}

document.getElementById("count").innerText=count
document.getElementById("cartItems").innerHTML=items
document.getElementById("checkoutItems").innerHTML=checkoutItems
document.getElementById("total").innerText=total
}

function changeQty(index,change){

cart[index].qty += change

if(cart[index].qty <= 0){
  delete cart[index]
}

updateCart()
}
function toggleCart(){
  document.getElementById("cartOverlay").style.display="block"
}
function scrollCheckout(){
  closeCart()
  document.getElementById("checkout").scrollIntoView({behavior:"smooth"})
}
function sendWhatsApp(){

if(Object.keys(cart).length === 0){
  alert("Cart is empty!")
  return
}

let name = document.getElementById("name").value
let phone = document.getElementById("phone").value
let address = document.getElementById("address").value
let pincode = document.getElementById("pincode").value

if(name=="" || phone=="" || address=="" || pincode==""){
  alert("Please fill all details")
  return
}

let text="🛒 *New Grocery Order* %0A%0A"
let total=0

for(let i in cart){
let p = cart[i]
text += `${p.name} - ${p.qty} x ₹${p.price} = ₹${p.qty*p.price}%0A`
total += p.qty*p.price
}

text += `%0A💰 Total: ₹${total}%0A%0A`
text += `👤 Name: ${name}%0A📞 Phone: ${phone}%0A🏠 Address: ${address}%0A📍 Pincode: ${pincode}`

window.open("https://wa.me/918607794578?text="+text)
}

function payUPI(){

let amount = document.getElementById("total").innerText

if(amount == 0){
  alert("Cart is empty!")
  return
}

let upiID = "8607794578@ybl"   // 👈 CHANGE THIS
let name = "DailyBasket Grocery"

// Proper UPI payment link
let upiLink = `upi://pay?pa=${upiID}&pn=${encodeURIComponent(name)}&am=${amount}&cu=INR&tn=${encodeURIComponent("Grocery Order Payment")}`

// Open payment apps
window.location.href = upiLink

}

    function openPopup(i){
document.getElementById("popup").style.display="flex"
document.getElementById("popImg").src=products[i].img
document.getElementById("popName").innerText=products[i].name
document.getElementById("popPrice").innerText="Price ₹"+products[i].price
document.getElementById("popDesc").innerText=products[i].desc
document.getElementById("popBtn").onclick=function(){addCart(i)}
}

function closePopup(){
document.getElementById("popup").style.display="none"
}
    function outsideClick(event){
  if(event.target.id === "popup"){
    closePopup()
  }
}

    function closeCart(){
  document.getElementById("cartOverlay").style.display="none"
}

function outsideCartClick(event){
  if(event.target.id === "cartOverlay"){
    closeCart()
  }
}

  function openCartPage(){
  // open cart popup first
  document.getElementById("cartOverlay").style.display="block"

  // small delay then scroll to checkout
  setTimeout(()=>{
    document.getElementById("checkout").scrollIntoView({behavior:"smooth"})
  },300)
}

    function sendCartWhatsApp(){

if(Object.keys(cart).length===0){
alert("Cart is empty!")
return
}

let name=document.getElementById("cartName").value
let phone=document.getElementById("cartPhone").value
let address=document.getElementById("cartAddress").value
let pincode=document.getElementById("cartPincode").value
let payment=document.getElementById("cartPayment").value

if(
name==""||
phone==""||
address==""||
pincode==""
){
alert("Please fill all delivery details")
return

let text="🛒 *New Grocery Order*%0A%0A"

let total=0

for(let i in cart){

let p=cart[i]

text+=`${p.name} - ${p.qty} x ₹${p.price} = ₹${p.qty*p.price}%0A`

total+=p.qty*p.price

}

text+=`%0A💰 Total: ₹${total}%0A`
text+=`💳 Payment: ${payment}%0A%0A`

text+=
`👤 Name: ${name}%0A`+
`📞 Phone: ${phone}%0A`+
`🏠 Address: ${address}%0A`+
`📍 Pincode: ${pincode}`

window.open(
"https://wa.me/918607794578?text="+text,
"_blank"
)

}
